name: Deploy GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: caa-jobs/package-lock.json

      - name: Install dependencies
        working-directory: caa-jobs
        run: npm ci

      - name: Extraction regression tests
        working-directory: caa-jobs
        run: npm run data:test

      - name: Build job board (Pages base path)
        working-directory: caa-jobs
        run: BASE_PATH=/caa-jobs/ npm run build

      - name: Assemble _site
        run: |
          mkdir -p _site
          # Copy the root static site (everything except the app, workflows, git).
          rsync -a --exclude caa-jobs --exclude .github --exclude .git \
            --exclude _site ./ _site/
          # Mount the built job board under /caa-jobs/.
          cp -r caa-jobs/dist _site/caa-jobs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
